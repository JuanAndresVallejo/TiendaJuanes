services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: juanes
      POSTGRES_USER: juanes
      POSTGRES_PASSWORD: juanes
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  backend:
    build:
      context: ./backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/juanes
      DB_USER: juanes
      DB_PASSWORD: juanes
      JWT_SECRET: change_this_secret_key_change_this_secret_key
      MERCADOPAGO_ACCESS_TOKEN: ""
      MERCADOPAGO_NOTIFICATION_URL: http://localhost/api/payments/webhook
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MAIL_HOST: ""
      MAIL_PORT: 587
      MAIL_USERNAME: ""
      MAIL_PASSWORD: ""
      CLOUDINARY_URL: ""
      FRONTEND_URL: http://localhost:8088
      N8N_WEBHOOK_URL: ""
    depends_on:
      - postgres
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: /api
      NEXT_PUBLIC_STATUS_BANNER: "true"
    depends_on:
      - backend
    ports:
      - "3000:3000"

  nginx:
    image: nginx:1.25
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8088:80"
    depends_on:
      - frontend
      - backend

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data:
